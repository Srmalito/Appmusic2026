<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%" fill="none">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background Circle (Dark translucent) -->
  <circle cx="12" cy="12" r="11" fill="#070a13" stroke="url(#neonGlow)" stroke-width="1"/>
  <!-- Music Note and Soundwave -->
  <path d="M9 18V7l10-2v11" stroke="url(#neonGlow)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="6.5" cy="18" r="2.5" fill="url(#neonGlow)" filter="url(#glow)"/>
  <circle cx="16.5" cy="16" r="2.5" fill="url(#neonGlow)" filter="url(#glow)"/>
</svg>