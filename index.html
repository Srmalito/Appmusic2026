<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#070a13" />
    
    <!-- SEO Meta Tags -->
    <title>VibeFlow - Escucha Música Gratis, Rápida y Sin Anuncios</title>
    <meta name="description" content="VibeFlow es una plataforma web y móvil ligera y minimalista para escuchar música sin anuncios molestos. Disfruta de la mejor experiencia de streaming de música rápida, fluida y con diseño premium." />
    
    <!-- Mobile / Web App Capable (iOS PWA Support) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VibeFlow" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Register Service Worker for PWA offline caching -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registrado correctamente.', reg.scope))
            .catch(err => console.log('Fallo en el registro del Service Worker.', err));
        });
      }
    </script>
  </body>
</html>
